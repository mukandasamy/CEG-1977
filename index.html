<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CEG 1977 Batch Golden Jubilee</title>

<style>

body{
font-family:Arial, Helvetica, sans-serif;
font-size:14px;
margin:10px;
}

header{
display:flex;
align-items:center;
gap:15px;
}

header img{
height:70px;
}

h1{
margin:0;
font-size:24px;
}

#search{
margin-left:auto;
padding:6px;
width:220px;
}

button{
padding:6px 10px;
cursor:pointer;
}

#filters{
margin-top:10px;
display:flex;
gap:10px;
align-items:center;
}

#filters select{
background:#007BFF;
color:white;
border:none;
padding:5px;
}

#recordCount{
margin-left:auto;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

thead{
position:sticky;
top:0;
background:#f0f0f0;
}

th,td{
border:1px solid #ddd;
padding:6px;
text-align:left;
}

.cardContainer{
display:flex;
flex-wrap:wrap;
gap:15px;
margin-top:10px;
}

.card{
border:1px solid #ccc;
padding:8px;
}

.card img{
margin-right:5px;
}

.gallery{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-top:10px;
}

.gallery img{
display:block;
}

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
}

.modalContent{
background:white;
margin:40px auto;
padding:15px;
width:80%;
max-height:85%;
overflow:auto;
}

.modalImages{
display:flex;
gap:10px;
margin-bottom:10px;
}

.footer{
margin-top:10px;
display:flex;
align-items:center;
gap:10px;
}

</style>
</head>

<body>

<header>

<img src="group_pics/college-1.jpeg">

<h1>CEG 1977 Batch Golden Jubilee</h1>

<button onclick="openGallery()">Gallery</button>

<input id="search" placeholder="Search directory...">

</header>


<div id="filters">

<select id="branchFilter"></select>

<select id="monthFilter"></select>

<select id="alphaFilter"></select>

<button onclick="clearFilters()">Clear Filters</button>

<button onclick="toggleView()">Show Card View</button>

<div id="recordCount"></div>

</div>


<div id="tableView"></div>

<div id="cardView" style="display:none"></div>


<div class="footer">

<select id="pageSize">
<option>10</option>
<option>25</option>
<option>50</option>
<option>100</option>
</select>

<button id="prevBtn">Prev</button>

<span id="pageInfo"></span>

<button id="nextBtn">Next</button>

</div>


<div id="modal1" class="modal">
<div class="modalContent" id="modalBody"></div>
</div>


<div id="modal2" class="modal">
<div class="modalContent" id="groupPics"></div>
</div>


<div id="galleryPage" style="display:none"></div>


<script>

const url="https://script.google.com/macros/s/AKfycbyYMhxBdpR0z92oBljcE_QRjF_ZqKA8asjiviXkXG6sPXzVh3j9npVisxqtNZBsCgHyBg/exec"

let data=[]
let filtered=[]
let page=1
let cardMode=false

const months=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"]

const placeholder="data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMTAwIiBoZWlnaHQ9IjEyMCIgdmlld0JveD0iMCAwIDEwMCAxMjAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PHJlY3Qgd2lkdGg9IjEwMCIgaGVpZ2h0PSIxMjAiIGZpbGw9IiNlZWUiLz48Y2lyY2xlIGN4PSI1MCIgY3k9IjM1IiByPSIyMCIgZmlsbD0iI2NjYyIvPjxyZWN0IHg9IjIwIiB5PSI2NSIgd2lkdGg9IjYwIiBoZWlnaHQ9IjM1IiBmaWxsPSIjY2NjIi8+PC9zdmc+"

function encodeName(name){
return encodeURIComponent(name)
}

async function loadData(){

const res=await fetch(url)
data=await res.json()

filtered=[...data]

initFilters()

render()

}

function initFilters(){

const branches=[...new Set(data.map(d=>d.Branch))].sort()

const branchSel=document.getElementById("branchFilter")

branchSel.innerHTML="<option value='ALL'>All Branches</option>"

branches.forEach(b=>{
branchSel.innerHTML+=`<option>${b}</option>`
})

const monthsPresent=[...new Set(data.map(d=>d.Date_of_birth.split("-")[1]))]

monthsPresent.sort((a,b)=>months.indexOf(a)-months.indexOf(b))

const monthSel=document.getElementById("monthFilter")

monthSel.innerHTML="<option value='ALL'>All Months</option>"

monthsPresent.forEach(m=>{
monthSel.innerHTML+=`<option>${m}</option>`
})

const alpha=[...new Set(data.map(d=>d.Name[0].toUpperCase()))].sort()

const alphaSel=document.getElementById("alphaFilter")

alphaSel.innerHTML="<option value='ALL'>All Letters</option>"

alpha.forEach(a=>{
alphaSel.innerHTML+=`<option>${a}</option>`
})

}

document.getElementById("branchFilter").onchange=applyFilters
document.getElementById("monthFilter").onchange=applyFilters
document.getElementById("alphaFilter").onchange=applyFilters
document.getElementById("search").oninput=applyFilters

function applyFilters(){

const b=document.getElementById("branchFilter").value
const m=document.getElementById("monthFilter").value
const a=document.getElementById("alphaFilter").value
const s=document.getElementById("search").value.toLowerCase()

filtered=data.filter(d=>{

if(b!=="ALL" && d.Branch!==b) return false

if(m!=="ALL" && d.Date_of_birth.split("-")[1]!==m) return false

if(a!=="ALL" && d.Name[0].toUpperCase()!==a) return false

if(s && !JSON.stringify(d).toLowerCase().includes(s)) return false

return true

})

page=1
render()

}

function clearFilters(){

document.getElementById("branchFilter").value="ALL"
document.getElementById("monthFilter").value="ALL"
document.getElementById("alphaFilter").value="ALL"
document.getElementById("search").value=""

filtered=[...data]

render()

}

function render(){

document.getElementById("recordCount").innerText=filtered.length+" records"

if(cardMode) renderCards()
else renderTable()

}

function paginate(arr){

const size=parseInt(document.getElementById("pageSize").value)

const start=(page-1)*size

return arr.slice(start,start+size)

}

function renderTable(){

const rows=paginate(filtered)

let html="<table><thead><tr><th>Name</th><th>Branch</th><th>DOB</th><th>Email</th><th>Phone</th><th>Action</th></tr></thead><tbody>"

rows.forEach((r,i)=>{

html+=`<tr>
<td>${r.Name}</td>
<td>${r.Branch}</td>
<td>${r.Date_of_birth}</td>
<td>${r.Email_address}</td>
<td>${r.Phone_numbers}</td>
<td><button onclick="showDetails(${(page-1)*10+i})">View Details</button></td>
</tr>`

})

html+="</tbody></table>"

document.getElementById("tableView").innerHTML=html

}

function renderCards(){

const rows=paginate(filtered)

let html="<div class='cardContainer'>"

rows.forEach((r,i)=>{

html+=`

<div class='card'>

<div>

<img src="individual_pics/${encodeName(r.Name)}-1977.jpeg" onerror="this.src='${placeholder}'">

<img src="individual_pics/${encodeName(r.Name)}-2020.jpeg" onerror="this.src='${placeholder}'">

<img src="individual_pics/${encodeName(r.Name)}-2027.jpeg" onerror="this.src='${placeholder}'">

</div>

<b>${r.Name}</b><br>

${r.Branch}<br>

${r.Date_of_birth}<br>

${r.Email_address}<br>

${r.Phone_numbers}<br>

<button onclick="showDetails(${(page-1)*10+i})">View Details</button>

</div>`

})

html+="</div>"

document.getElementById("cardView").innerHTML=html

}

function toggleView(){

cardMode=!cardMode

document.getElementById("tableView").style.display=cardMode?"none":"block"

document.getElementById("cardView").style.display=cardMode?"block":"none"

render()

}

function showDetails(i){

const r=filtered[i]

let html=`

<div class="modalImages">

<img src="individual_pics/${encodeName(r.Name)}-1977.jpeg" onerror="this.src='${placeholder}'">

<img src="individual_pics/${encodeName(r.Name)}-2020.jpeg" onerror="this.src='${placeholder}'">

<img src="individual_pics/${encodeName(r.Name)}-2027.jpeg" onerror="this.src='${placeholder}'">

</div>
`

for(let k in r){

if(k==="Name"||k==="Branch") html+=`<b>${k}: ${r[k]}</b><br>`
else html+=`${k}: ${r[k]}<br>`

}

html+=`<br><button onclick="showGroup('${encodeName(r.Name)}')">Show More Pictures</button>`

document.getElementById("modalBody").innerHTML=html

document.getElementById("modal1").style.display="block"

}

function showGroup(name){

let html=""

for(let i=1;i<=25;i++){

html+=`<img src="group_pics/${name}-${i}.jpeg" onerror="this.style.display='none'">`

}

document.getElementById("groupPics").innerHTML=html

document.getElementById("modal2").style.display="block"

}

function openGallery(){

let html="<div class='gallery'>"

for(let i=1;i<=100;i++){

html+=`<img src="group_pics/group-${i}.jpeg" onerror="this.style.display='none'">`

}

html+="</div>"

document.getElementById("galleryPage").innerHTML=html
document.getElementById("galleryPage").style.display="block"

}

window.onclick=function(e){

if(e.target.className==="modal") e.target.style.display="none"

}

loadData()

</script>

</body>
</html>
