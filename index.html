<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CEG 1977 Batch Directory</title>
    <style>
        body { font-family: sans-serif; font-size: 14px; background: #f8fafc; padding: 20px; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 20px; border-radius: 8px; }
        .controls { display: flex; gap: 10px; margin-bottom: 20px; background: #edf2f7; padding: 15px; border-radius: 6px; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #004a99; color: white; padding: 10px; text-align: left; }
        td { padding: 10px; border-bottom: 1px solid #eee; }
        .btn { padding: 8px 12px; background: #004a99; color: white; border: none; cursor: pointer; border-radius: 4px; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: white; padding: 30px; width: 700px; max-height: 85vh; overflow-y: auto; border-radius: 8px; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h1>CEG 1977 Batch Golden Jubilee</h1>
        <button class="btn" onclick="showGallery()">Gallery View</button>
    </div>

    <div class="controls">
        <select id="branchFilter" onchange="render()"><option value="ALL">All Branches</option></select>
        <select id="monthFilter" onchange="render()"><option value="ALL">All Months</option></select>
        <select id="alphaFilter" onchange="render()"><option value="ALL">A-Z</option></select>
        <button class="btn" onclick="toggleView()">Toggle View</button>
    </div>

    <div id="tableWrapper"><table id="dataTable"><thead><tr><th>Name</th><th>Branch</th><th>DOB</th><th>Email</th><th>Phone</th><th>Action</th></tr></thead><tbody id="tableBody"></tbody></table></div>
    <div id="cardWrapper" class="hidden"></div>
</div>

<div id="modal" class="modal" onclick="closeModal()"><div class="modal-content" onclick="event.stopPropagation()" id="modalBody"></div></div>

<script>
    let appData = [];
    const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];

    async function init() {
        const res = await fetch('https://script.google.com/macros/s/AKfycbyYMhxBdpR0z92oBljcE_QRjF_ZqKA8asjiviXkXG6sPXzVh3j9npVisxqtNZBsCgHyBg/exec');
        appData = await res.json();
        updateFilterOptions();
        render();
    }

    function updateFilterOptions() {
        const branches = [...new Set(appData.map(d => d.Branch))].filter(Boolean).sort();
        document.getElementById('branchFilter').innerHTML = '<option value="ALL">All Branches</option>' + branches.map(b => `<option value="${b}">${b}</option>`).join('');
        
        document.getElementById('monthFilter').innerHTML = '<option value="ALL">All Months</option>' + months.map(m => `<option value="${m}">${m}</option>`).join('');
        
        const alphas = [...new Set(appData.map(d => d.Name[0].toUpperCase()))].sort();
        document.getElementById('alphaFilter').innerHTML = '<option value="ALL">A-Z</option>' + alphas.map(a => `<option value="${a}">${a}</option>`).join('');
    }

    function render() {
        const bF = document.getElementById('branchFilter').value;
        const mF = document.getElementById('monthFilter').value;
        const aF = document.getElementById('alphaFilter').value;
        
        const filtered = appData.filter(d => {
            const m = d.Date_of_birth ? months[new Date(d.Date_of_birth).getMonth()] : "";
            return (bF === 'ALL' || d.Branch === bF) && (mF === 'ALL' || m === mF) && (aF === 'ALL' || d.Name[0].toUpperCase() === aF);
        });

        document.getElementById('tableBody').innerHTML = filtered.map(d => `
            <tr>
                <td>${d.Name || ''}</td>
                <td>${d.Branch || ''}</td>
                <td>${formatDate(d.Date_of_birth)}</td>
                <td>${d.Email_address || ''}</td>
                <td>${d.Phone_numbers || ''}</td>
                <td><button class="btn" onclick="openDetails('${d.Name}')">View</button></td>
            </tr>
        `).join('');
    }

    function formatDate(dStr) {
        if (!dStr) return "";
        const d = new Date(dStr);
        return `${d.getDate().toString().padStart(2, '0')}-${months[d.getMonth()]}`;
    }

    function openDetails(name) {
        const d = appData.find(x => x.Name === name);
        if(!d) return;
        let html = `<h3>${d.Name}</h3><div style="display:flex; gap:10px;">
            ${['1977','2020','2027'].map(y => `<img src="individual_pics/${name}-${y}.jpeg" style="width:100px" onerror="this.style.display='none'">`).join('')}
        </div>`;
        Object.entries(d).forEach(([k, v]) => { if(k !== 'Name') html += `<p><strong>${k.replace(/_/g, ' ')}:</strong> ${v || 'N/A'}</p>`; });
        document.getElementById('modalBody').innerHTML = html + `<br><button class="btn" onclick="closeModal()">Close</button>`;
        document.getElementById('modal').style.display = 'flex';
    }

    function showGallery() {
        let html = `<h3>Gallery</h3><div style="display:grid; grid-template-columns:repeat(5, 1fr); gap:10px;">`;
        for(let i=1; i<=100; i++) html += `<img src="group_pics/group-${i}.jpeg" style="width:100%" onerror="this.style.display='none'">`;
        document.getElementById('modalBody').innerHTML = html + `</div><br><button class="btn" onclick="closeModal()">Close</button>`;
        document.getElementById('modal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('modal').style.display = 'none'; }
    function toggleView() { document.getElementById('tableWrapper').classList.toggle('hidden'); document.getElementById('cardWrapper').classList.toggle('hidden'); }

    window.onload = init;
</script>
</body>
</html>
