<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CEG 1977 Batch Golden Jubilee</title>

<style>

:root{
--primary:#1e40af;
--border:#e5e7eb;
--bg:#f8fafc;
}

body{
font-family:Arial,Helvetica,sans-serif;
font-size:14px;
margin:12px;
background:white;
color:#111;
}

header{
display:flex;
align-items:center;
gap:14px;
border-bottom:1px solid var(--border);
padding-bottom:8px;
}

header img{
height:70px;
}

h1{
margin:0;
font-size:22px;
font-weight:600;
}

#search{
margin-left:auto;
padding:6px 8px;
border:1px solid var(--border);
border-radius:4px;
width:240px;
}

button{
background:var(--primary);
color:white;
border:none;
padding:6px 10px;
border-radius:4px;
cursor:pointer;
}

button:hover{
opacity:.9;
}

#filters{
margin-top:12px;
display:flex;
align-items:center;
gap:10px;
}

#filters select{
padding:6px;
background:#2563eb;
color:white;
border:none;
border-radius:4px;
}

#recordCount{
margin-left:auto;
color:#444;
}

table{
width:100%;
border-collapse:collapse;
margin-top:12px;
}

th,td{
border:1px solid var(--border);
padding:6px;
}

thead{
background:#f1f5f9;
position:sticky;
top:0;
}

.cardGrid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
gap:14px;
margin-top:14px;
}

.card{
border:1px solid var(--border);
border-radius:6px;
padding:8px;
background:white;
}

.cardImages{
display:flex;
gap:6px;
margin-bottom:6px;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
gap:12px;
margin-top:20px;
}

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.55);
}

.modalContent{
background:white;
margin:40px auto;
padding:18px;
width:85%;
max-height:85%;
overflow:auto;
border-radius:6px;
}

.modalImages{
display:flex;
gap:10px;
margin-bottom:12px;
}

.footer{
margin-top:10px;
display:flex;
align-items:center;
gap:10px;
}

.footer select{
padding:5px;
}

</style>
</head>

<body>

<header>

<img src="group_pics/college-1.jpeg">

<h1>CEG 1977 Batch Golden Jubilee</h1>

<button onclick="openGallery()">Gallery</button>

<input id="search" placeholder="Search name, branch, company, phone...">

</header>


<div id="filters">

<select id="branchFilter"></select>
<select id="monthFilter"></select>
<select id="alphaFilter"></select>

<button onclick="clearFilters()">Clear Filters</button>

<button onclick="toggleView()">Show Card View</button>

<div id="recordCount"></div>

</div>


<div id="tableView"></div>
<div id="cardView" style="display:none"></div>


<div class="footer">

<select id="pageSize">
<option>10</option>
<option>25</option>
<option>50</option>
<option>100</option>
</select>

<button onclick="prevPage()">Prev</button>

<span id="pageInfo"></span>

<button onclick="nextPage()">Next</button>

</div>


<div id="modal1" class="modal">
<div class="modalContent" id="modalBody"></div>
</div>

<div id="modal2" class="modal">
<div class="modalContent" id="groupPics"></div>
</div>

<div id="galleryPage" style="display:none"></div>


<script>

const url="https://script.google.com/macros/s/AKfycbyYMhxBdpR0z92oBljcE_QRjF_ZqKA8asjiviXkXG6sPXzVh3j9npVisxqtNZBsCgHyBg/exec"

let data=[]
let filtered=[]
let page=1
let cardMode=false

const monthOrder=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"]

const placeholder="data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMTAwIiBoZWlnaHQ9IjEyMCIgdmlld0JveD0iMCAwIDEwMCAxMjAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PHJlY3Qgd2lkdGg9IjEwMCIgaGVpZ2h0PSIxMjAiIGZpbGw9IiNlZWUiLz48Y2lyY2xlIGN4PSI1MCIgY3k9IjM1IiByPSIyMCIgZmlsbD0iI2NjYyIvPjxyZWN0IHg9IjIwIiB5PSI2NSIgd2lkdGg9IjYwIiBoZWlnaHQ9IjM1IiBmaWxsPSIjY2NjIi8+PC9zdmc+"


function encodeName(name){
return encodeURIComponent(name)
}

async function loadData(){

const res=await fetch(url)
let json=await res.json()

data=Array.isArray(json)?json:(json.data||[])

filtered=[...data]

initFilters()
render()

}

function initFilters(){

const branches=[...new Set(data.map(d=>d.Branch))].sort()

branchFilter.innerHTML="<option value='ALL'>All Branches</option>"
branches.forEach(b=>branchFilter.innerHTML+=`<option>${b}</option>`)

const months=[...new Set(data.map(d=>d.Date_of_birth.split("-")[1]))]

months.sort((a,b)=>monthOrder.indexOf(a)-monthOrder.indexOf(b))

monthFilter.innerHTML="<option value='ALL'>All Months</option>"
months.forEach(m=>monthFilter.innerHTML+=`<option>${m}</option>`)

const letters=[...new Set(data.map(d=>d.Name[0].toUpperCase()))].sort()

alphaFilter.innerHTML="<option value='ALL'>All Letters</option>"
letters.forEach(a=>alphaFilter.innerHTML+=`<option>${a}</option>`)

}

function applyFilters(){

const b=branchFilter.value
const m=monthFilter.value
const a=alphaFilter.value
const s=search.value.toLowerCase()

filtered=data.filter(d=>{

if(b!=="ALL" && d.Branch!==b) return false
if(m!=="ALL" && d.Date_of_birth.split("-")[1]!==m) return false
if(a!=="ALL" && d.Name[0].toUpperCase()!==a) return false

if(s && !Object.values(d).join(" ").toLowerCase().includes(s))
return false

return true

})

page=1
render()

}

branchFilter.onchange=applyFilters
monthFilter.onchange=applyFilters
alphaFilter.onchange=applyFilters
search.oninput=applyFilters

function clearFilters(){

branchFilter.value="ALL"
monthFilter.value="ALL"
alphaFilter.value="ALL"
search.value=""

filtered=[...data]

render()

}

function pageSize(){
return parseInt(document.getElementById("pageSize").value)
}

function paginate(){

const start=(page-1)*pageSize()
return filtered.slice(start,start+pageSize())

}

function render(){

recordCount.innerText=filtered.length+" records"

if(cardMode) renderCards()
else renderTable()

updatePagination()

}

function renderTable(){

const rows=paginate()

let html="<table><thead><tr><th>Name</th><th>Branch</th><th>DOB</th><th>Email</th><th>Phone</th><th>Action</th></tr></thead><tbody>"

rows.forEach((r,i)=>{

const index=(page-1)*pageSize()+i

html+=`
<tr>
<td>${r.Name}</td>
<td>${r.Branch}</td>
<td>${r.Date_of_birth}</td>
<td>${r.Email_address||""}</td>
<td>${r.Phone_numbers||""}</td>
<td><button onclick="showDetails(${index})">View Details</button></td>
</tr>
`

})

html+="</tbody></table>"

tableView.innerHTML=html

}

function renderCards(){

const rows=paginate()

let html="<div class='cardGrid'>"

rows.forEach((r,i)=>{

const index=(page-1)*pageSize()+i

html+=`

<div class="card">

<div class="cardImages">

<img src="individual_pics/${encodeName(r.Name)}-1977.jpeg" onerror="this.src='${placeholder}'">
<img src="individual_pics/${encodeName(r.Name)}-2020.jpeg" onerror="this.src='${placeholder}'">
<img src="individual_pics/${encodeName(r.Name)}-2027.jpeg" onerror="this.src='${placeholder}'">

</div>

<b>${r.Name}</b><br>
${r.Branch}<br>
${r.Date_of_birth}<br>
${r.Email_address||""}<br>
${r.Phone_numbers||""}<br>

<button onclick="showDetails(${index})">View Details</button>

</div>`

})

html+="</div>"

cardView.innerHTML=html

}

function toggleView(){

cardMode=!cardMode

tableView.style.display=cardMode?"none":"block"
cardView.style.display=cardMode?"block":"none"

render()

}

function updatePagination(){

const total=Math.ceil(filtered.length/pageSize())

pageInfo.innerText="Page "+page+" / "+(total||1)

}

function prevPage(){

if(page>1){page--;render()}

}

function nextPage(){

const total=Math.ceil(filtered.length/pageSize())

if(page<total){page++;render()}

}

function showDetails(i){

const r=filtered[i]

let html=`

<div class="modalImages">

<img src="individual_pics/${encodeName(r.Name)}-1977.jpeg" onerror="this.src='${placeholder}'">
<img src="individual_pics/${encodeName(r.Name)}-2020.jpeg" onerror="this.src='${placeholder}'">
<img src="individual_pics/${encodeName(r.Name)}-2027.jpeg" onerror="this.src='${placeholder}'">

</div>
`

for(const k in r){

if(k==="Name"||k==="Branch")
html+=`<b>${k}: ${r[k]}</b><br>`
else
html+=`${k}: ${r[k]||""}<br>`

}

html+=`<br><button onclick="showGroup('${encodeName(r.Name)}')">Show More Pictures</button>`

modalBody.innerHTML=html
modal1.style.display="block"

}

function showGroup(name){

let html=""

for(let i=1;i<=25;i++){

html+=`<img src="group_pics/${name}-${i}.jpeg" onerror="this.style.display='none'">`

}

groupPics.innerHTML=html
modal2.style.display="block"

}

function openGallery(){

let html="<div class='gallery'>"

for(let i=1;i<=100;i++){

html+=`<img src="group_pics/group-${i}.jpeg" onerror="this.style.display='none'">`

}

html+="</div>"

galleryPage.innerHTML=html
galleryPage.style.display="block"

}

window.onclick=function(e){

if(e.target.classList.contains("modal"))
e.target.style.display="none"

}

loadData()

</script>

</body>
</html>
