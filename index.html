<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CEG 1977 Batch Golden Jubilee</title>

<style>

body{
font-family: Arial, Helvetica, sans-serif;
font-size:14px;
margin:0;
padding:0;
}

header{
display:flex;
align-items:center;
padding:10px;
border-bottom:1px solid #ccc;
gap:15px;
}

header img{
height:70px;
}

h1{
font-size:20px;
margin:0;
flex-grow:1;
}

button{
padding:5px 10px;
cursor:pointer;
}

input[type="text"]{
padding:5px;
width:250px;
}

#filters{
display:flex;
gap:10px;
padding:8px;
border-bottom:1px solid #ddd;
align-items:center;
}

select{
padding:4px;
}

#recordCount{
margin-left:auto;
font-weight:bold;
}

table{
width:100%;
border-collapse:collapse;
}

thead{
position:sticky;
top:0;
background:#f3f3f3;
}

th,td{
padding:6px;
border-bottom:1px solid #ddd;
text-align:left;
}

.cardContainer{
display:flex;
flex-wrap:wrap;
gap:10px;
padding:10px;
}

.card{
border:1px solid #ccc;
padding:8px;
width:360px;
}

.cardImages{
display:flex;
gap:6px;
}

footer{
display:flex;
align-items:center;
gap:10px;
padding:10px;
border-top:1px solid #ccc;
}

#pagination{
margin-left:auto;
}

.modal{
display:none;
position:fixed;
top:5%;
left:5%;
width:90%;
height:85%;
background:white;
border:1px solid #444;
overflow:auto;
padding:10px;
z-index:999;
}

.modalImages{
display:flex;
gap:10px;
}

.gallery{
display:flex;
flex-wrap:wrap;
gap:8px;
padding:10px;
}

img{
max-width:none;
}

</style>
</head>

<body>

<header>

<img src="group_pics/college-1.jpeg">

<h1>CEG 1977 Batch Golden Jubilee</h1>

<button onclick="showGallery()">Gallery</button>

<input id="searchBox" placeholder="Search..." oninput="applyFilters()">

</header>


<div id="filters">

<select id="branchFilter"></select>

<select id="monthFilter"></select>

<select id="letterFilter"></select>

<button onclick="clearFilters()">Clear Filters</button>

<button onclick="toggleView()">Show Card View</button>

<div id="recordCount"></div>

</div>


<div id="tableView">

<table>

<thead>
<tr>
<th>Name</th>
<th>Branch</th>
<th>DOB</th>
<th>Email</th>
<th>Phone</th>
<th>Action</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>

</table>

</div>


<div id="cardView" class="cardContainer" style="display:none"></div>


<footer>

<select id="pageSize" onchange="render()">
<option>10</option>
<option>25</option>
<option>50</option>
<option>100</option>
</select>

<div id="pagination">
<button onclick="prevPage()">Prev</button>
<span id="pageInfo"></span>
<button onclick="nextPage()">Next</button>
</div>

</footer>


<div id="modal1" class="modal"></div>
<div id="modal2" class="modal"></div>


<div id="galleryView" style="display:none">

<div class="gallery" id="galleryImages"></div>

</div>



<script>

const DATA_URL="https://script.google.com/macros/s/AKfycbyYMhxBdpR0z92oBljcE_QRjF_ZqKA8asjiviXkXG6sPXzVh3j9npVisxqtNZBsCgHyBg/exec";

let rawData=[]
let filtered=[]
let currentPage=1
let cardMode=false

function safeImage(img){

img.onerror=function(){
img.src="silhouette.jpeg"
}

}

async function loadData(){

const res=await fetch(DATA_URL)
rawData=await res.json()

populateFilters()

applyFilters()

}

function populateFilters(){

let branches=[...new Set(rawData.map(r=>r.Branch_name))].sort()

let months=[...new Set(rawData.map(r=>r.Date_of_birth.split("-")[1]))]

let letters=[...new Set(rawData.map(r=>r.Name[0].toUpperCase()))]

fillSelect("branchFilter",branches)
fillSelect("monthFilter",months)
fillSelect("letterFilter",letters)

}

function fillSelect(id,values){

let s=document.getElementById(id)

s.innerHTML="<option>ALL</option>"

values.forEach(v=>{
let o=document.createElement("option")
o.text=v
s.appendChild(o)
})

}

function clearFilters(){

document.getElementById("branchFilter").value="ALL"
document.getElementById("monthFilter").value="ALL"
document.getElementById("letterFilter").value="ALL"
document.getElementById("searchBox").value=""

applyFilters()

}

function applyFilters(){

let branch=document.getElementById("branchFilter").value
let month=document.getElementById("monthFilter").value
let letter=document.getElementById("letterFilter").value
let search=document.getElementById("searchBox").value.toLowerCase()

filtered=rawData.filter(r=>{

let match=true

if(branch!="ALL") match &= r.Branch_name==branch
if(month!="ALL") match &= r.Date_of_birth.includes(month)
if(letter!="ALL") match &= r.Name.startsWith(letter)

if(search){
match &= Object.values(r).join(" ").toLowerCase().includes(search)
}

return match

})

currentPage=1

render()

}

function render(){

let pageSize=parseInt(document.getElementById("pageSize").value)

let start=(currentPage-1)*pageSize
let end=start+pageSize

let pageData=filtered.slice(start,end)

document.getElementById("recordCount").innerText=filtered.length+" records"

document.getElementById("pageInfo").innerText=currentPage+" / "+Math.ceil(filtered.length/pageSize)

if(cardMode) renderCards(pageData)
else renderTable(pageData)

}

function renderTable(data){

let tb=document.getElementById("tableBody")
tb.innerHTML=""

data.forEach(r=>{

let tr=document.createElement("tr")

tr.innerHTML=`
<td>${r.Name}</td>
<td>${r.Branch_name}</td>
<td>${r.Date_of_birth}</td>
<td>${r.Email_address}</td>
<td>${r.Phone_numbers}</td>
<td><button onclick='showDetails(${JSON.stringify(r)})'>View Details</button></td>
`

tb.appendChild(tr)

})

}

function renderCards(data){

let c=document.getElementById("cardView")

c.innerHTML=""

data.forEach(r=>{

let div=document.createElement("div")
div.className="card"

div.innerHTML=`

<div class="cardImages">

<img src="individual_pics/${r.Name}-1977.jpeg" onerror="this.src='silhouette.jpeg'">

<img src="individual_pics/${r.Name}-2020.jpeg" onerror="this.src='silhouette.jpeg'">

<img src="individual_pics/${r.Name}-2027.jpeg" onerror="this.src='silhouette.jpeg'">

<button onclick='showDetails(${JSON.stringify(r)})'>View Details</button>

<button onclick="showGroup('${r.Name}')">Show Pictures</button>

</div>

<div><b>${r.Name}</b></div>
<div>${r.Branch_name}</div>
<div>${r.Date_of_birth}</div>
<div>${r.Email_address}</div>
<div>${r.Phone_numbers}</div>

`

c.appendChild(div)

})

}

function toggleView(){

cardMode=!cardMode

document.getElementById("tableView").style.display=cardMode?"none":"block"
document.getElementById("cardView").style.display=cardMode?"flex":"none"

render()

}

function prevPage(){

if(currentPage>1){
currentPage--
render()
}

}

function nextPage(){

let pageSize=parseInt(document.getElementById("pageSize").value)

if(currentPage<Math.ceil(filtered.length/pageSize)){
currentPage++
render()
}

}

function showDetails(r){

let m=document.getElementById("modal1")

let rows=""

for(let k in r){

rows+=`<tr><td>${k}</td><td>${r[k]}</td></tr>`

}

m.innerHTML=`

<button onclick="closeModal()">Close</button>

<div class="modalImages">

<img src="individual_pics/${r.Name}-1977.jpeg" onerror="this.src='silhouette.jpeg'">

<img src="individual_pics/${r.Name}-2020.jpeg" onerror="this.src='silhouette.jpeg'">

<img src="individual_pics/${r.Name}-2027.jpeg" onerror="this.src='silhouette.jpeg'">

<button onclick="showGroup('${r.Name}')">Show More Pictures</button>

</div>

<table>${rows}</table>

`

m.style.display="block"

}

function showGroup(name){

let m=document.getElementById("modal2")

let html="<button onclick='closeModal()'>Close</button><div class='gallery'>"

for(let i=1;i<=25;i++){

html+=`<img src="group_pics/${name}-${i}.jpeg" onerror="this.style.display='none'">`

}

html+="</div>"

m.innerHTML=html

m.style.display="block"

}

function closeModal(){

document.getElementById("modal1").style.display="none"
document.getElementById("modal2").style.display="none"

}

function showGallery(){

document.getElementById("galleryView").style.display="block"

let g=document.getElementById("galleryImages")

if(g.innerHTML==""){

for(let i=1;i<=100;i++){

let img=document.createElement("img")

img.src=`group_pics/group-${i}.jpeg`
img.onerror=function(){this.style.display="none"}

g.appendChild(img)

}

}

}

loadData()

</script>

</body>
</html>
