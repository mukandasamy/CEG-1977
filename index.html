<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CEG 1977 Batch Golden Jubilee</title>
    <style>
        /* Professional Corporate CSS */
        body { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; background: #f4f7f6; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: #004a99; color: white; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #ddd; }
        .btn { padding: 8px 16px; background: #004a99; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; }
        .modal-box { background: white; padding: 20px; border-radius: 8px; width: 500px; max-height: 80vh; overflow-y: auto; }
        .filter-section { margin-bottom: 20px; padding: 10px; background: #eef2f7; border-radius: 4px; }
    </style>
</head>
<body>

<div class="container">
    <h1>CEG 1977 Batch Golden Jubilee</h1>
    <div class="filter-section">
        <input type="text" id="search" placeholder="Search by name..." oninput="renderTable()">
        <select id="branchFilter" onchange="renderTable()"><option value="ALL">All Branches</option></select>
    </div>
    
    <table id="dataTable">
        <thead><tr><th>Name</th><th>Branch</th><th>DOB</th><th>Action</th></tr></thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<div id="modal" class="modal"><div class="modal-box"><div id="modalContent"></div><button class="btn" onclick="closeModal()">Close</button></div></div>

<script>
    let allData = [];

    async function init() {
        try {
            const res = await fetch('https://script.google.com/macros/s/AKfycbyYMhxBdpR0z92oBljcE_QRjF_ZqKA8asjiviXkXG6sPXzVh3j9npVisxqtNZBsCgHyBg/exec');
            allData = await res.json();
            
            // Populate branch dropdown
            const branches = [...new Set(allData.map(d => d.Branch_name))];
            const select = document.getElementById('branchFilter');
            branches.forEach(b => select.innerHTML += `<option value="${b}">${b}</option>`);
            
            renderTable();
        } catch (e) { alert("Data fetch failed. Ensure deployment is 'Me/Anyone'."); }
    }

    function renderTable() {
        const search = document.getElementById('search').value.toLowerCase();
        const branch = document.getElementById('branchFilter').value;
        const body = document.getElementById('tableBody');
        
        const filtered = allData.filter(d => 
            (branch === 'ALL' || d.Branch_name === branch) && 
            (d.Name.toLowerCase().includes(search))
        );

        body.innerHTML = filtered.map(d => `
            <tr>
                <td>${d.Name}</td>
                <td>${d.Branch_name}</td>
                <td>${d.Date_of_birth}</td>
                <td><button class="btn" onclick="showDetails('${d.Name}')">View</button></td>
            </tr>
        `).join('');
    }

    function showDetails(name) {
        const d = allData.find(x => x.Name === name);
        document.getElementById('modalContent').innerHTML = `<h3>${d.Name}</h3><p>Branch: ${d.Branch_name}</p><p>Email: ${d.Email_address}</p>`;
        document.getElementById('modal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('modal').style.display = 'none'; }

    window.onload = init;
</script>
</body>
</html>
