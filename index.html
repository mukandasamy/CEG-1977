<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CEG 1977 Batch Golden Jubilee</title>
    <style>
        body { font-family: sans-serif; font-size: 14px; background: #f8fafc; padding: 20px; }
        .container { max-width: 1100px; margin: auto; }
        .header { display: flex; align-items: center; justify-content: space-between; background: white; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th, td { padding: 12px; border: 1px solid #e2e8f0; text-align: left; }
        th { background: #004a99; color: white; }
        .btn { padding: 8px 12px; cursor: pointer; background: #004a99; color: white; border: none; border-radius: 4px; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: white; padding: 25px; width: 700px; max-height: 85vh; overflow-y: auto; border-radius: 8px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div style="display:flex; align-items:center; gap:15px;">
            <img src="group_pics/college-1.jpeg" style="height:60px;" onerror="this.src='https://via.placeholder.com/100'">
            <h1>CEG 1977 Batch Golden Jubilee</h1>
        </div>
        <div>
            <button class="btn" onclick="alert('Gallery Feature Pending')">Gallery</button>
            <input type="text" id="search" placeholder="Search..." oninput="app.render()">
        </div>
    </div>

    <select id="branchFilter" onchange="app.render()"><option value="ALL">All Branches</option></select>
    
    <table id="dataTable">
        <thead><tr><th>Name</th><th>Branch</th><th>DOB</th><th>Action</th></tr></thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<div id="modal" class="modal" onclick="document.getElementById('modal').style.display='none'">
    <div class="modal-content" onclick="event.stopPropagation()" id="modalBody"></div>
</div>

<script>
const app = {
    data: [],
    formatDate(dStr) {
        if (!dStr) return "";
        if (dStr.includes('T')) return dStr.split('T')[0];
        return dStr;
    },
    async init() {
        try {
            const res = await fetch('https://script.google.com/macros/s/AKfycbyYMhxBdpR0z92oBljcE_QRjF_ZqKA8asjiviXkXG6sPXzVh3j9npVisxqtNZBsCgHyBg/exec');
            this.data = await res.json();
            const branches = [...new Set(this.data.map(d => d.Branch))].filter(Boolean);
            const select = document.getElementById('branchFilter');
            branches.forEach(b => select.innerHTML += `<option value="${b}">${b}</option>`);
            this.render();
        } catch (e) { console.error(e); }
    },
    render() {
        const tbody = document.getElementById('tableBody');
        const branch = document.getElementById('branchFilter').value;
        const search = document.getElementById('search').value.toLowerCase();
        
        const filtered = this.data.filter(d => 
            (branch === 'ALL' || d.Branch === branch) && 
            (d.Name.toLowerCase().includes(search))
        );
        
        tbody.innerHTML = filtered.map(d => `
            <tr>
                <td>${d.Name || ''}</td>
                <td>${d.Branch || ''}</td>
                <td>${this.formatDate(d.Date_of_birth)}</td>
                <td><button class="btn" onclick="openDetails('${d.Name}')">View Details</button></td>
            </tr>
        `).join('');
    }
};

function openDetails(name) {
    const d = app.data.find(x => x.Name === name);
    if (!d) return;

    let html = `<div style="display:flex; gap:10px; margin-bottom:15px;">
        ${['1977','2020','2027'].map(y => `<img src="individual_pics/${name}-${y}.jpeg" style="width:150px; height:auto;" onerror="this.src='https://via.placeholder.com/150'">`).join('')}
    </div><h3>${d.Name}</h3>`;

    // Dynamic field generation
    Object.entries(d).forEach(([key, val]) => {
        if (key !== 'Name') {
            html += `<p><strong>${key.replace(/_/g, ' ')}:</strong> ${val || 'N/A'}</p>`;
        }
    });

    document.getElementById('modalBody').innerHTML = html + `<button class="btn" onclick="document.getElementById('modal').style.display='none'">Close</button>`;
    document.getElementById('modal').style.display = 'flex';
}

window.onload = () => app.init();
</script>
</body>
</html>
