<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CEG 1977 Batch Golden Jubilee</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100; align-items: center; justify-content: center; }
        .sticky-top { position: sticky; top: 0; background: #f1f5f9; }
    </style>
</head>
<body class="bg-slate-50 p-4">

    <header class="bg-white p-4 shadow rounded mb-4 flex items-center justify-between">
        <h1 class="text-xl font-bold uppercase">CEG 1977 Batch Golden Jubilee</h1>
        <input type="text" id="searchBar" placeholder="Search..." class="border p-2 rounded" oninput="render()">
    </header>

    <div class="bg-white p-4 shadow rounded mb-4 flex gap-4">
        <select id="branchFilter" onchange="render()" class="border p-2 rounded"><option value="ALL">All Branches</option></select>
        <span id="recordCount" class="font-bold"></span>
    </div>

    <div class="bg-white shadow rounded overflow-hidden">
        <table class="w-full text-left">
            <thead class="sticky-top bg-slate-100">
                <tr><th class="p-3">Name</th><th class="p-3">Branch</th><th class="p-3">DOB</th><th class="p-3">Action</th></tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <div id="modal1" class="modal" onclick="closeModal('modal1')">
        <div class="bg-white p-6 rounded-lg w-full max-w-lg" onclick="event.stopPropagation()">
            <h2 id="m1Name" class="text-2xl font-bold mb-4"></h2>
            <div id="m1Details"></div>
            <button onclick="closeModal('modal1')" class="mt-4 bg-red-500 text-white p-2 rounded">Close</button>
        </div>
    </div>

    <script>
        // 1. GLOBAL DATA
        let allData = [];

        // 2. DATA INITIALIZATION
        async function init() {
            const URL = 'https://script.google.com/macros/s/AKfycbyYMhxBdpR0z92oBljcE_QRjF_ZqKA8asjiviXkXG6sPXzVh3j9npVisxqtNZBsCgHyBg/exec';
            try {
                const res = await fetch(URL);
                allData = await res.json();
                populateFilters();
                render();
            } catch (e) {
                console.error("Initialization Error:", e);
                alert("Failed to load data. Check Console (F12).");
            }
        }

        // 3. FILTER LOGIC
        function populateFilters() {
            const branches = [...new Set(allData.map(d => d.Branch_name))].sort();
            const select = document.getElementById('branchFilter');
            branches.forEach(b => select.innerHTML += `<option value="${b}">${b}</option>`);
        }

        // 4. RENDERING LOGIC
        function render() {
            const branch = document.getElementById('branchFilter').value;
            const search = document.getElementById('searchBar').value.toLowerCase();
            const tbody = document.getElementById('tableBody');
            
            const filtered = allData.filter(d => 
                (branch === 'ALL' || d.Branch_name === branch) && 
                (d.Name.toLowerCase().includes(search))
            );

            document.getElementById('recordCount').innerText = `Records: ${filtered.length}`;
            tbody.innerHTML = filtered.map(d => `
                <tr class="border-b">
                    <td class="p-3">${d.Name}</td>
                    <td class="p-3">${d.Branch_name}</td>
                    <td class="p-3">${d.Date_of_birth}</td>
                    <td class="p-3"><button onclick="viewDetails('${d.Name}')" class="bg-blue-600 text-white px-3 py-1 rounded">View</button></td>
                </tr>
            `).join('');
        }

        // 5. MODAL LOGIC
        function viewDetails(name) {
            const d = allData.find(x => x.Name === name);
            document.getElementById('m1Name').innerText = d.Name;
            document.getElementById('m1Details').innerHTML = Object.entries(d)
                .map(([k, v]) => `<p><strong>${k}:</strong> ${v}</p>`).join('');
            document.getElementById('modal1').style.display = 'flex';
        }

        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        // 6. START APP
        window.onload = init;
    </script>
</body>
</html>
