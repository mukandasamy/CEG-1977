<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CEG 1977 Batch Directory</title>
    <style>
        body { font-family: sans-serif; font-size: 14px; background: #f8fafc; padding: 20px; }
        .container { max-width: 1000px; margin: auto; }
        .flex-box { display: flex; gap: 10px; margin-bottom: 20px; align-items: center; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th, td { padding: 12px; border: 1px solid #e2e8f0; text-align: left; }
        th { background: #004a99; color: white; }
        .card-view { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px; }
        .card { background: white; padding: 15px; border: 1px solid #e2e8f0; border-radius: 8px; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; }
        .modal-box { background: white; padding: 25px; border-radius: 8px; width: 400px; }
        .btn { padding: 8px 12px; cursor: pointer; background: #004a99; color: white; border: none; border-radius: 4px; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>CEG 1977 Batch Golden Jubilee</h2>
    <div class="flex-box">
        <input type="text" id="search" placeholder="Search..." oninput="updateView()">
        <select id="branchFilter" onchange="updateView()"><option value="ALL">All Branches</option></select>
        <button class="btn" onclick="toggleView()">Toggle View</button>
    </div>

    <div id="tableContainer"><table id="dataTable"><thead><tr><th>Name</th><th>Branch</th><th>Action</th></tr></thead><tbody id="tableBody"></tbody></table></div>
    <div id="cardContainer" class="card-view hidden"></div>
</div>

<div id="modal" class="modal" onclick="closeModal()"><div class="modal-box" onclick="event.stopPropagation()"><div id="modalContent"></div><button class="btn" onclick="closeModal()">Close</button></div></div>

<script>
    let allData = [];
    let isTable = true;

    async function init() {
        try {
            const res = await fetch('https://script.google.com/macros/s/AKfycbyYMhxBdpR0z92oBljcE_QRjF_ZqKA8asjiviXkXG6sPXzVh3j9npVisxqtNZBsCgHyBg/exec');
            allData = await res.json();
            
            // Populate Filters
            const branches = [...new Set(allData.map(d => d.Branch_name))];
            const select = document.getElementById('branchFilter');
            branches.forEach(b => select.innerHTML += `<option value="${b}">${b}</option>`);
            
            updateView();
        } catch (e) { console.error("Init Error:", e); }
    }

    function updateView() {
        const search = document.getElementById('search').value.toLowerCase();
        const branch = document.getElementById('branchFilter').value;
        const filtered = allData.filter(d => (branch === 'ALL' || d.Branch_name === branch) && d.Name.toLowerCase().includes(search));
        
        const body = document.getElementById('tableBody');
        const cards = document.getElementById('cardContainer');
        
        body.innerHTML = filtered.map(d => `<tr><td>${d.Name}</td><td>${d.Branch_name}</td><td><button class="btn" onclick="openModal('${d.Name}')">View</button></td></tr>`).join('');
        cards.innerHTML = filtered.map(d => `<div class="card"><strong>${d.Name}</strong><p>${d.Branch_name}</p><button class="btn" onclick="openModal('${d.Name}')">View</button></div>`).join('');
    }

    function toggleView() {
        isTable = !isTable;
        document.getElementById('tableContainer').classList.toggle('hidden', !isTable);
        document.getElementById('cardContainer').classList.toggle('hidden', isTable);
    }

    function openModal(name) {
        const d = allData.find(x => x.Name === name);
        document.getElementById('modalContent').innerHTML = `<h3>${d.Name}</h3><p>Branch: ${d.Branch_name}</p><p>Email: ${d.Email_address}</p>`;
        document.getElementById('modal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('modal').style.display = 'none'; }

    window.onload = init;
</script>
</body>
</html>
