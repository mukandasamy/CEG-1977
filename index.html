<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CEG 1977 Batch Golden Jubilee</title>
    <style>
        /* Corporate-grade CSS */
        body { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; color: #333; background: #f4f7f6; margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .header { display: flex; align-items: center; justify-content: space-between; border-bottom: 2px solid #004a99; padding-bottom: 15px; margin-bottom: 20px; }
        .filter-bar { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #004a99; color: white; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #ddd; }
        .btn { padding: 8px 16px; background: #004a99; color: white; border: none; cursor: pointer; border-radius: 4px; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: white; padding: 30px; border-radius: 8px; width: 700px; max-height: 85vh; overflow-y: auto; }
        .card-view { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
    </style>
</head>
<body>

<div class="container">
    <header class="header">
        <div style="display:flex; align-items:center; gap:20px;">
            <img src="group_pics/college-1.jpeg" style="height:70px;" onerror="this.src='https://via.placeholder.com/100'">
            <h1>CEG 1977 Batch Golden Jubilee</h1>
        </div>
        <div>
            <button class="btn" onclick="showGallery()">Gallery</button>
            <input type="text" id="search" placeholder="Search across all fields..." oninput="updateApp()" style="padding:8px; width:250px;">
        </div>
    </header>

    <div class="filter-bar">
        <select id="branchFilter" onchange="updateApp()"><option value="ALL">All Branches</option></select>
        <select id="monthFilter" onchange="updateApp()"><option value="ALL">All Months</option></select>
        <select id="letterFilter" onchange="updateApp()"><option value="ALL">A-Z</option></select>
        <button class="btn" onclick="clearFilters()">Clear Filters</button>
        <button class="btn" onclick="toggleView()" id="viewToggle">Show Card View</button>
        <span id="recordCount" style="margin-left:auto; font-weight:bold;"></span>
    </div>

    <div id="tableWrapper"><table id="dataTable"><thead><tr><th>Name</th><th>Branch</th><th>DOB</th><th>Action</th></tr></thead><tbody id="tableBody"></tbody></table></div>
    <div id="cardWrapper" class="card-view hidden"></div>
</div>

<div id="modal1" class="modal" onclick="closeModal('modal1')"><div class="modal-content" onclick="event.stopPropagation()" id="modal1Body"></div></div>
<div id="modal2" class="modal" onclick="closeModal('modal2')"><div class="modal-content" id="modal2Body"></div></div>

<script>
    let appData = [];
    let isTable = true;
    const url = 'https://script.google.com/macros/s/AKfycbyYMhxBdpR0z92oBljcE_QRjF_ZqKA8asjiviXkXG6sPXzVh3j9npVisxqtNZBsCgHyBg/exec';

    async function init() {
        try {
            const res = await fetch(url);
            appData = await res.json();
            populateFilters();
            updateApp();
        } catch (e) { console.error("Data Load Error:", e); }
    }

    function populateFilters() {
        const branches = [...new Set(appData.map(d => d.Branch))].filter(Boolean);
        const sel = document.getElementById('branchFilter');
        branches.forEach(b => sel.innerHTML += `<option value="${b}">${b}</option>`);
    }

    function updateApp() {
        const search = document.getElementById('search').value.toLowerCase();
        const branch = document.getElementById('branchFilter').value;
        const filtered = appData.filter(d => (branch === 'ALL' || d.Branch === branch) && (Object.values(d).some(v => String(v).toLowerCase().includes(search))));
        
        document.getElementById('recordCount').innerText = `Total: ${filtered.length}`;
        document.getElementById('tableBody').innerHTML = filtered.map(d => `<tr><td>${d.Name}</td><td>${d.Branch}</td><td>${d.Date_of_birth}</td><td><button class="btn" onclick="openDetails('${d.Name}')">View</button></td></tr>`).join('');
    }

    function openDetails(name) {
        const d = appData.find(x => x.Name === name);
        let html = `<h3>${d.Name}</h3><div style="display:flex; gap:10px;">
            ${['1977','2020','2027'].map(y => `<img src="individual_pics/${name}-${y}.jpeg" style="width:100px; height:auto;" onerror="this.style.display='none'">`).join('')}
        </div>`;
        
        // Explicit mapping of your 13 fields
        const fields = ['Branch', 'Date_of_birth', 'Email_address', 'Phone_numbers', 'Address', 'Spouse_name', 'Anniversary_date', 'Children_details', 'Qualification', 'Company_designation', 'Company_worked', 'Company_phone_email'];
        fields.forEach(f => html += `<p><strong>${f.replace(/_/g, ' ')}:</strong> ${d[f] || 'N/A'}</p>`);
        
        document.getElementById('modal1Body').innerHTML = html + `<button class="btn" onclick="closeModal('modal1')">Close</button>`;
        document.getElementById('modal1').style.display = 'flex';
    }

    function toggleView() { isTable = !isTable; document.getElementById('tableWrapper').classList.toggle('hidden'); document.getElementById('cardWrapper').classList.toggle('hidden'); }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    function showGallery() { alert("Gallery View Logic"); }
    function clearFilters() { document.getElementById('branchFilter').value = 'ALL'; updateApp(); }

    window.onload = init;
</script>
</body>
</html>
