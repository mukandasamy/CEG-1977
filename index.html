<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CEG 1977 Batch Golden Jubilee</title>

<style>

body{
font-family:Arial;
font-size:14px;
margin:0;
}

header{
display:flex;
align-items:center;
gap:15px;
padding:10px;
border-bottom:1px solid #ccc;
}

header img{
height:70px;
}

h1{
margin:0;
flex-grow:1;
font-size:20px;
}

input{
padding:6px;
border:1px solid #2a6fd6;
}

button{
background:#2a6fd6;
color:white;
border:none;
padding:6px 10px;
cursor:pointer;
}

#filters{
display:flex;
gap:10px;
padding:8px;
background:#eef4ff;
border-bottom:2px solid #2a6fd6;
position:sticky;
top:0;
}

select{
border:1px solid #2a6fd6;
padding:5px;
}

table{
width:100%;
border-collapse:collapse;
}

thead{
background:#dbe7ff;
}

th,td{
padding:6px;
border-bottom:1px solid #ddd;
}

.cardContainer{
display:flex;
flex-wrap:wrap;
gap:10px;
padding:10px;
}

.card{
border:1px solid #ddd;
padding:10px;
}

.cardImages{
display:flex;
gap:10px;
overflow-x:auto;
}

.modal{
display:none;
position:fixed;
top:5%;
left:5%;
width:90%;
height:85%;
background:white;
border:2px solid #2a6fd6;
overflow:auto;
padding:10px;
z-index:1000;
}

.modalImages{
display:flex;
gap:10px;
overflow-x:auto;
margin-bottom:10px;
}

.gallery{
padding:20px;
}

.gallery img{
display:block;
margin-bottom:20px;
}

footer{
display:flex;
padding:10px;
border-top:1px solid #ccc;
}

#pagination{
margin-left:auto;
}

</style>
</head>

<body>

<header>

<img src="group_pics/college-1.jpeg">

<h1>CEG 1977 Batch Golden Jubilee</h1>

<button onclick="showGallery()">Gallery</button>

<input id="searchBox" placeholder="Search..." oninput="applyFilters()">

</header>

<div id="filters">

<select id="branchFilter"></select>
<select id="monthFilter"></select>
<select id="letterFilter"></select>

<button onclick="clearFilters()">Clear Filters</button>

<button onclick="toggleView()">Show Card View</button>

<div id="recordCount" style="margin-left:auto"></div>

</div>

<div id="tableView">

<table>

<thead>
<tr>
<th>Name</th>
<th>Branch</th>
<th>DOB</th>
<th>Email</th>
<th>Phone</th>
<th>Action</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>

</table>

</div>

<div id="cardView" class="cardContainer" style="display:none"></div>

<footer>

<select id="pageSize" onchange="render()">
<option>10</option>
<option>25</option>
<option>50</option>
<option>100</option>
</select>

<div id="pagination">
<button onclick="prevPage()">Prev</button>
<span id="pageInfo"></span>
<button onclick="nextPage()">Next</button>
</div>

</footer>

<div id="modal1" class="modal"></div>
<div id="modal2" class="modal"></div>

<div id="galleryView" style="display:none">

<button onclick="hideGallery()">Back to Directory</button>

<div class="gallery" id="galleryImages"></div>

</div>

<script>

const DATA_URL="https://script.google.com/macros/s/AKfycbyYMhxBdpR0z92oBljcE_QRjF_ZqKA8asjiviXkXG6sPXzVh3j9npVisxqtNZBsCgHyBg/exec";

let rawData=[]
let filtered=[]
let currentPage=1
let cardMode=false

const monthOrder=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"]

async function loadData(){

const res=await fetch(DATA_URL)
rawData=await res.json()

populateFilters()
applyFilters()

}

function populateFilters(){

let branches=[...new Set(rawData.map(r=>r.Branch))].sort()

let months=[...new Set(rawData.map(r=>r.Date_of_birth.split("-")[1]))]

months.sort((a,b)=>monthOrder.indexOf(a)-monthOrder.indexOf(b))

let letters=[...new Set(rawData.map(r=>r.Name[0].toUpperCase()))].sort()

fillSelect("branchFilter",branches)
fillSelect("monthFilter",months)
fillSelect("letterFilter",letters)

}

function fillSelect(id,values){

let s=document.getElementById(id)

s.innerHTML="<option>ALL</option>"

values.forEach(v=>{
let o=document.createElement("option")
o.text=v
s.appendChild(o)
})

}

function clearFilters(){

branchFilter.value="ALL"
monthFilter.value="ALL"
letterFilter.value="ALL"
searchBox.value=""

applyFilters()

}

function applyFilters(){

let branch=branchFilter.value
let month=monthFilter.value
let letter=letterFilter.value
let search=searchBox.value.toLowerCase()

filtered=rawData.filter(r=>{

let ok=true

if(branch!=="ALL") ok = ok && r.Branch===branch
if(month!=="ALL") ok = ok && r.Date_of_birth.includes(month)
if(letter!=="ALL") ok = ok && r.Name.startsWith(letter)

if(search){
ok = ok && Object.values(r).join(" ").toLowerCase().includes(search)
}

return ok

})

currentPage=1
render()

}

function render(){

let pageSize=parseInt(pageSizeSelect.value||10)
pageSizeSelect=document.getElementById("pageSize")

let start=(currentPage-1)*pageSize
let end=start+pageSize

let pageData=filtered.slice(start,end)

recordCount.innerText=filtered.length+" records"

pageInfo.innerText=currentPage+" / "+Math.ceil(filtered.length/pageSize)

if(cardMode) renderCards(pageData)
else renderTable(pageData)

}

function renderTable(data){

tableBody.innerHTML=""

data.forEach((r,i)=>{

let tr=document.createElement("tr")

tr.innerHTML=`
<td>${r.Name}</td>
<td>${r.Branch}</td>
<td>${r.Date_of_birth}</td>
<td>${r.Email_address}</td>
<td>${r.Phone_numbers}</td>
<td><button onclick="showDetails(${i})">View Details</button></td>
`

tableBody.appendChild(tr)

})

}

function renderCards(data){

cardView.innerHTML=""

data.forEach((r,i)=>{

let div=document.createElement("div")
div.className="card"

div.innerHTML=`

<div class="cardImages">

<img src="individual_pics/${r.Name}-1977.jpeg" onerror="this.src='silhouette.jpeg'">
<img src="individual_pics/${r.Name}-2020.jpeg" onerror="this.src='silhouette.jpeg'">
<img src="individual_pics/${r.Name}-2027.jpeg" onerror="this.src='silhouette.jpeg'">

</div>

<button onclick="showDetails(${i})">View Details</button>

<div><b>${r.Name}</b></div>
<div>${r.Branch}</div>
<div>${r.Date_of_birth}</div>
<div>${r.Email_address}</div>
<div>${r.Phone_numbers}</div>

`

cardView.appendChild(div)

})

}

function toggleView(){

cardMode=!cardMode

tableView.style.display=cardMode?"none":"block"
cardView.style.display=cardMode?"flex":"none"

render()

}

function prevPage(){
if(currentPage>1){currentPage--;render()}
}

function nextPage(){

let pageSize=parseInt(pageSize.value)

if(currentPage<Math.ceil(filtered.length/pageSize)){
currentPage++
render()
}

}

function showDetails(index){

let r=filtered[index]

let rows=""

for(let k in r){
rows+=`<tr><td>${k}</td><td>${r[k]}</td></tr>`
}

modal1.innerHTML=`

<button onclick="closeModal()">Close</button>

<div class="modalImages">

<img src="individual_pics/${r.Name}-1977.jpeg" onerror="this.src='silhouette.jpeg'">
<img src="individual_pics/${r.Name}-2020.jpeg" onerror="this.src='silhouette.jpeg'">
<img src="individual_pics/${r.Name}-2027.jpeg" onerror="this.src='silhouette.jpeg'">

<button onclick="showGroup('${r.Name}')">Show More Pictures</button>

</div>

<table>${rows}</table>

`

modal1.style.display="block"

}

function showGroup(name){

let html="<button onclick='closeModal()'>Close</button><div class='gallery'>"

for(let i=1;i<=25;i++){
html+=`<img src="group_pics/${name}-${i}.jpeg" onerror="this.style.display='none'">`
}

html+="</div>"

modal2.innerHTML=html
modal2.style.display="block"

}

function closeModal(){
modal1.style.display="none"
modal2.style.display="none"
}

function showGallery(){

tableView.style.display="none"
cardView.style.display="none"

galleryView.style.display="block"

let g=galleryImages

if(g.innerHTML===""){

for(let i=1;i<=100;i++){

let img=document.createElement("img")

img.src=`group_pics/group-${i}.jpeg`
img.onerror=function(){this.style.display="none"}

g.appendChild(img)

}

}

}

function hideGallery(){

galleryView.style.display="none"

if(cardMode){
cardView.style.display="flex"
}else{
tableView.style.display="block"
}

}

loadData()

</script>

</body>
</html>
