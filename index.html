<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CEG 1977 Batch Golden Jubilee</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; background: #f8fafc; padding: 20px; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .filter-section { display: flex; gap: 10px; align-items: center; margin-bottom: 20px; padding: 15px; background: #edf2f7; border-radius: 6px; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #004a99; color: white; padding: 10px; text-align: left; }
        td { padding: 10px; border-bottom: 1px solid #e2e8f0; }
        .btn { padding: 8px 12px; background: #004a99; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: white; padding: 30px; border-radius: 8px; width: 600px; max-height: 80vh; overflow-y: auto; }
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <div style="display:flex; align-items:center; gap:15px;">
            <img src="group_pics/college-1.jpeg" style="height:60px;" onerror="this.src='https://via.placeholder.com/100'">
            <h1>CEG 1977 Batch Golden Jubilee</h1>
        </div>
        <button class="btn" onclick="showGallery()">Gallery View</button>
    </div>

    <div class="filter-section">
        <select id="branchFilter" onchange="updateApp()"><option value="ALL">All Branches</option></select>
        <select id="monthFilter" onchange="updateApp()"><option value="ALL">All Months</option></select>
        <select id="alphaFilter" onchange="updateApp()"><option value="ALL">A-Z</option></select>
        <button class="btn" onclick="clearAllFilters()">Clear Filters</button>
        <span id="recordCount" style="margin-left:auto; font-weight:bold;"></span>
    </div>

    <div id="tableWrapper"><table id="dataTable"><thead><tr><th>Name</th><th>Branch</th><th>DOB</th><th>Action</th></tr></thead><tbody id="tableBody"></tbody></table></div>
</div>

<div id="modal" class="modal" onclick="closeModal()"><div class="modal-content" onclick="event.stopPropagation()" id="modalBody"></div></div>

<script>
    let appData = [];
    const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];

    async function init() {
        const res = await fetch('https://script.google.com/macros/s/AKfycbyYMhxBdpR0z92oBljcE_QRjF_ZqKA8asjiviXkXG6sPXzVh3j9npVisxqtNZBsCgHyBg/exec');
        appData = await res.json();
        populateFilters();
        updateApp();
    }

    function formatDate(dStr) {
        if (!dStr) return "";
        const d = new Date(dStr);
        return `${d.getDate().toString().padStart(2, '0')}-${months[d.getMonth()]}`;
    }

    function populateFilters() {
        // Branch
        const branches = [...new Set(appData.map(d => d.Branch))].filter(Boolean).sort();
        branches.forEach(b => document.getElementById('branchFilter').innerHTML += `<option value="${b}">${b}</option>`);
        // Month
        months.forEach(m => document.getElementById('monthFilter').innerHTML += `<option value="${m}">${m}</option>`);
        // Alpha
        const letters = [...new Set(appData.map(d => d.Name[0].toUpperCase()))].sort();
        letters.forEach(l => document.getElementById('alphaFilter').innerHTML += `<option value="${l}">${l}</option>`);
    }

    function updateApp() {
        const bF = document.getElementById('branchFilter').value;
        const mF = document.getElementById('monthFilter').value;
        const aF = document.getElementById('alphaFilter').value;
        
        const filtered = appData.filter(d => {
            const m = d.Date_of_birth ? months[new Date(d.Date_of_birth).getMonth()] : "";
            return (bF === 'ALL' || d.Branch === bF) && 
                   (mF === 'ALL' || m === mF) && 
                   (aF === 'ALL' || d.Name[0].toUpperCase() === aF);
        });
        
        document.getElementById('recordCount').innerText = `Records: ${filtered.length}`;
        document.getElementById('tableBody').innerHTML = filtered.map(d => `<tr><td>${d.Name}</td><td>${d.Branch}</td><td>${formatDate(d.Date_of_birth)}</td><td><button class="btn" onclick="openDetails('${d.Name}')">View</button></td></tr>`).join('');
    }

    function showGallery() {
        let html = `<h3>Gallery</h3><div class="gallery-grid">`;
        for(let i=1; i<=100; i++) {
            html += `<img src="group_pics/group-${i}.jpeg" style="width:100%" onerror="this.style.display='none'">`;
        }
        document.getElementById('modalBody').innerHTML = html + `</div><button class="btn" onclick="closeModal()">Close</button>`;
        document.getElementById('modal').style.display = 'flex';
    }

    function openDetails(name) { /* Same as previous implementation */ }
    function closeModal() { document.getElementById('modal').style.display = 'none'; }
    function clearAllFilters() {
        document.querySelectorAll('select').forEach(s => s.value = 'ALL');
        updateApp();
    }
    window.onload = init;
</script>
</body>
</html>
