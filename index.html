<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CEG 1977 Batch Directory</title>
    <style>
        body { font-family: sans-serif; font-size: 14px; background: #f4f7f6; padding: 20px; }
        .container { max-width: 90%; margin: auto; background: white; padding: 20px; border-radius: 8px; }
        .filter-section { display: flex; gap: 15px; margin-bottom: 20px; padding: 15px; background: #eef2f7; border-radius: 6px; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #004a99; color: white; padding: 12px; text-align: left; }
        th:nth-child(3) { width: 120px; } /* Makes DOB column wider */
        td { padding: 10px; border-bottom: 1px solid #ddd; }
        .btn { padding: 8px 12px; background: #004a99; color: white; border: none; cursor: pointer; border-radius: 4px; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 30px; width: 90vw; height: 90vh; overflow-y: auto; border-radius: 8px; }
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
        .card-view { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h1>CEG 1977 Batch Golden Jubilee</h1>
        <div>
            <button class="btn" onclick="showGallery()">Gallery View</button>
            <button class="btn" onclick="toggleView()" id="viewToggle">Show Card View</button>
        </div>
    </div>

    <div class="filter-section">
        <select id="branchFilter" onchange="render()"><option value="ALL">All Branches</option></select>
        <select id="monthFilter" onchange="render()"><option value="ALL">All Months</option></select>
        <select id="alphaFilter" onchange="render()"><option value="ALL">A-Z</option></select>
        <button class="btn" onclick="clearFilters()">Clear Filters</button>
    </div>

    <div id="tableWrapper"><table id="dataTable"><thead><tr><th>Name</th><th>Branch</th><th>DOB</th><th>Email</th><th>Phone</th><th>Action</th></tr></thead><tbody id="tableBody"></tbody></table></div>
    <div id="cardWrapper" class="card-view" style="display:none;"></div>
</div>

<div id="modal" class="modal" onclick="closeModal()"><div class="modal-content" onclick="event.stopPropagation()" id="modalBody"></div></div>

<script>
    let appData = [], isTable = true;
    const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];

    async function init() {
        const res = await fetch('https://script.google.com/macros/s/AKfycbyYMhxBdpR0z92oBljcE_QRjF_ZqKA8asjiviXkXG6sPXzVh3j9npVisxqtNZBsCgHyBg/exec');
        appData = await res.json();
        
        // Dynamic Filter Population
        const branches = [...new Set(appData.map(d => d.Branch))].filter(Boolean).sort();
        document.getElementById('branchFilter').innerHTML = '<option value="ALL">All Branches</option>' + branches.map(b => `<option value="${b}">${b}</option>`).join('');
        
        const alphas = [...new Set(appData.map(d => d.Name[0].toUpperCase()))].filter(Boolean).sort();
        document.getElementById('alphaFilter').innerHTML = '<option value="ALL">A-Z</option>' + alphas.map(a => `<option value="${a}">${a}</option>`).join('');
        
        render();
    }

    function render() {
        const bF = document.getElementById('branchFilter').value;
        const mF = document.getElementById('monthFilter').value;
        const aF = document.getElementById('alphaFilter').value;
        
        const filtered = appData.filter(d => {
            const m = d.Date_of_birth ? months[new Date(d.Date_of_birth).getMonth()] : "";
            return (bF === 'ALL' || d.Branch === bF) && (mF === 'ALL' || m === mF) && (aF === 'ALL' || d.Name[0].toUpperCase() === aF);
        });

        // Update Table
        document.getElementById('tableBody').innerHTML = filtered.map(d => `<tr><td>${d.Name}</td><td>${d.Branch}</td><td>${formatDOB(d.Date_of_birth)}</td><td>${d.Email_address}</td><td>${d.Phone_numbers}</td><td><button class="btn" onclick="openDetails('${d.Name}')">View</button></td></tr>`).join('');
        
        // Update Cards
        document.getElementById('cardWrapper').innerHTML = filtered.map(d => `<div class="card" style="border:1px solid #ddd; padding:10px; border-radius:5px;"><strong>${d.Name}</strong><p>${d.Branch}</p><button class="btn" onclick="openDetails('${d.Name}')">Details</button></div>`).join('');
    }

    function formatDOB(dStr) {
        if (!dStr) return "";
        const d = new Date(dStr);
        return `${d.getDate().toString().padStart(2, '0')}-${months[d.getMonth()]}`;
    }

    function toggleView() {
        isTable = !isTable;
        document.getElementById('tableWrapper').style.display = isTable ? 'block' : 'none';
        document.getElementById('cardWrapper').style.display = isTable ? 'none' : 'grid';
        document.getElementById('viewToggle').innerText = isTable ? "Show Card View" : "Show Table View";
    }

    function showGallery() {
        document.getElementById('modalBody').innerHTML = `<h3>Gallery</h3><div class="gallery-grid">` + 
            Array.from({length: 100}, (_,i) => `<img src="group_pics/group-${i+1}.jpeg" style="width:100%" onerror="this.style.display='none'">`).join('') + 
            `</div><br><button class="btn" onclick="closeModal()">Close</button>`;
        document.getElementById('modal').style.display = 'flex';
    }

    function clearFilters() {
        document.getElementById('branchFilter').value = 'ALL';
        document.getElementById('monthFilter').value = 'ALL';
        document.getElementById('alphaFilter').value = 'ALL';
        render();
    }
    
    function closeModal() { document.getElementById('modal').style.display = 'none'; }
    window.onload = init;
</script>
</body>
</html>
