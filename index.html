<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CEG 1977 Batch Directory</title>
    <style>
        body { font-family: sans-serif; font-size: 14px; background: #f4f7f6; padding: 20px; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 20px; border-radius: 8px; }
        .filter-section { display: flex; gap: 10px; margin-bottom: 20px; background: #eef2f7; padding: 15px; border-radius: 6px; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #004a99; color: white; padding: 12px; }
        td { padding: 10px; border-bottom: 1px solid #ddd; }
        .btn { padding: 8px 12px; background: #004a99; color: white; border: none; cursor: pointer; border-radius: 4px; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 30px; width: 90%; max-height: 90vh; overflow-y: auto; border-radius: 8px; }
        .gallery-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
    </style>
</head>
<body>

<div class="container">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h1>CEG 1977 Batch Golden Jubilee</h1>
        <button class="btn" onclick="showGallery()">Gallery View</button>
    </div>

    <div class="filter-section">
        <select id="branchFilter" onchange="render()"><option value="ALL">All Branches</option></select>
        <select id="monthFilter" onchange="render()"><option value="ALL">All Months</option></select>
        <select id="alphaFilter" onchange="render()"><option value="ALL">A-Z</option></select>
        <button class="btn" onclick="clearFilters()">Clear Filters</button>
    </div>

    <table id="dataTable"><thead><tr><th>Name</th><th>Branch</th><th>DOB</th><th>Email</th><th>Phone</th><th>Action</th></tr></thead><tbody id="tableBody"></tbody></table>
</div>

<div id="modal" class="modal" onclick="closeModal()"><div class="modal-content" onclick="event.stopPropagation()" id="modalBody"></div></div>

<script>
    let appData = [];
    const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];

    async function init() {
        const res = await fetch('https://script.google.com/macros/s/AKfycbyYMhxBdpR0z92oBljcE_QRjF_ZqKA8asjiviXkXG6sPXzVh3j9npVisxqtNZBsCgHyBg/exec');
        appData = await res.json();
        populateFilters();
        render();
    }

    function populateFilters() {
        const branches = [...new Set(appData.map(d => d.Branch))].filter(Boolean).sort();
        document.getElementById('branchFilter').innerHTML = '<option value="ALL">All Branches</option>' + branches.map(b => `<option value="${b}">${b}</option>`).join('');
        
        const alphas = [...new Set(appData.map(d => d.Name[0].toUpperCase()))].sort();
        document.getElementById('alphaFilter').innerHTML = '<option value="ALL">A-Z</option>' + alphas.map(a => `<option value="${a}">${a}</option>`).join('');
    }

    function render() {
        const bF = document.getElementById('branchFilter').value;
        const mF = document.getElementById('monthFilter').value;
        const aF = document.getElementById('alphaFilter').value;
        
        const filtered = appData.filter(d => {
            const m = d.Date_of_birth ? months[new Date(d.Date_of_birth).getMonth()] : "";
            return (bF === 'ALL' || d.Branch === bF) && (mF === 'ALL' || m === mF) && (aF === 'ALL' || d.Name[0].toUpperCase() === aF);
        });

        document.getElementById('tableBody').innerHTML = filtered.map(d => `
            <tr>
                <td>${d.Name}</td><td>${d.Branch}</td><td>${d.Date_of_birth}</td><td>${d.Email_address}</td><td>${d.Phone_numbers}</td>
                <td><button class="btn" onclick="openDetails('${d.Name}')">View</button></td>
            </tr>
        `).join('');
    }

    function openDetails(name) {
        const d = appData.find(x => x.Name === name);
        let html = `<h3>${d.Name}</h3>
            <div style="display:flex; gap:10px;">
                ${['1977','2020','2027'].map(y => `<img src="individual_pics/${name}-${y}.jpeg" style="width:150px" onerror="this.style.display='none'">`).join('')}
            </div>
            <button class="btn" onclick="showModal2('${name}')" id="showMoreBtn" style="display:none;">View More Pictures</button>`;
        
        Object.entries(d).forEach(([k, v]) => { if(k !== 'Name') html += `<p><strong>${k.replace(/_/g, ' ')}:</strong> ${v}</p>`; });
        
        document.getElementById('modalBody').innerHTML = html + `<button class="btn" onclick="closeModal()">Close</button>`;
        document.getElementById('modal').style.display = 'flex';
        
        // Check for file existence logic could be added here to display the button
        document.getElementById('showMoreBtn').style.display = 'block'; 
    }

    function showGallery() {
        document.getElementById('modalBody').innerHTML = `<h3>Gallery</h3><div class="gallery-container">` + 
            Array.from({length: 100}, (_,i) => `<img src="group_pics/group-${i+1}.jpeg" style="width:100%" onerror="this.style.display='none'">`).join('') + 
            `</div><br><button class="btn" onclick="closeModal()">Close</button>`;
        document.getElementById('modal').style.display = 'flex';
    }

    function clearFilters() {
        document.getElementById('branchFilter').value = 'ALL';
        document.getElementById('monthFilter').value = 'ALL';
        document.getElementById('alphaFilter').value = 'ALL';
        render();
    }

    function closeModal() { document.getElementById('modal').style.display = 'none'; }
    window.onload = init;
</script>
</body>
</html>
