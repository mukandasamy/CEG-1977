<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CEG 1977 Batch Directory</title>
    <style>
        body { font-family: sans-serif; font-size: 14px; background: #f8fafc; padding: 20px; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 20px; border-radius: 8px; }
        .header { display: flex; align-items: center; justify-content: space-between; border-bottom: 2px solid #004a99; padding-bottom: 15px; }
        .controls { display: flex; gap: 10px; margin: 20px 0; padding: 10px; background: #edf2f7; border-radius: 6px; flex-wrap: wrap; }
        .card-view { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px; }
        .card { border: 1px solid #ddd; padding: 15px; border-radius: 8px; background: white; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #004a99; color: white; padding: 10px; text-align: left; }
        td { padding: 10px; border-bottom: 1px solid #eee; }
        .btn { padding: 8px 12px; background: #004a99; color: white; border: none; cursor: pointer; border-radius: 4px; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: white; padding: 25px; width: 80%; max-height: 80vh; overflow-y: auto; border-radius: 8px; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div style="display:flex; align-items:center; gap:15px;">
            <img src="group_pics/college-1.jpeg" style="height:60px;" onerror="this.src='https://via.placeholder.com/60'">
            <h1>CEG 1977 Batch Golden Jubilee</h1>
        </div>
        <button class="btn" onclick="showGallery()">Gallery View</button>
    </div>

    <div class="controls">
        <select id="branchFilter" onchange="render()"><option value="ALL">All Branches</option></select>
        <select id="monthFilter" onchange="render()"><option value="ALL">All Months</option></select>
        <select id="alphaFilter" onchange="render()"><option value="ALL">A-Z</option></select>
        <button class="btn" onclick="toggleView()" id="viewBtn">Show Card View</button>
        <span id="recordCount" style="margin-left:auto; font-weight:bold;"></span>
    </div>

    <div id="tableWrapper"><table id="dataTable"><thead><tr><th>Name</th><th>Branch</th><th>DOB</th><th>Action</th></tr></thead><tbody id="tableBody"></tbody></table></div>
    <div id="cardWrapper" class="card-view hidden"></div>
</div>

<div id="modal" class="modal" onclick="closeModal()"><div class="modal-content" onclick="event.stopPropagation()" id="modalBody"></div></div>

<script>
    let appData = [];
    let isTable = true;
    const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];

    async function init() {
        const res = await fetch('https://script.google.com/macros/s/AKfycbyYMhxBdpR0z92oBljcE_QRjF_ZqKA8asjiviXkXG6sPXzVh3j9npVisxqtNZBsCgHyBg/exec');
        appData = await res.json();
        
        // Populating Filters
        const branches = [...new Set(appData.map(d => d.Branch))].filter(Boolean).sort();
        branches.forEach(b => document.getElementById('branchFilter').innerHTML += `<option value="${b}">${b}</option>`);
        
        months.forEach(m => document.getElementById('monthFilter').innerHTML += `<option value="${m}">${m}</option>`);
        
        const alpha = [...new Set(appData.map(d => d.Name[0].toUpperCase()))].sort();
        alpha.forEach(l => document.getElementById('alphaFilter').innerHTML += `<option value="${l}">${l}</option>`);
        
        render();
    }

    function render() {
        const bF = document.getElementById('branchFilter').value;
        const mF = document.getElementById('monthFilter').value;
        const aF = document.getElementById('alphaFilter').value;
        
        const filtered = appData.filter(d => {
            const m = d.Date_of_birth ? months[new Date(d.Date_of_birth).getMonth()] : "";
            return (bF === 'ALL' || d.Branch === bF) && 
                   (mF === 'ALL' || m === mF) && 
                   (aF === 'ALL' || d.Name[0].toUpperCase() === aF);
        });

        document.getElementById('recordCount').innerText = `Records: ${filtered.length}`;
        
        document.getElementById('tableBody').innerHTML = filtered.map(d => `<tr><td>${d.Name}</td><td>${d.Branch}</td><td>${formatDate(d.Date_of_birth)}</td><td><button class="btn" onclick="openDetails('${d.Name}')">View</button></td></tr>`).join('');
        
        document.getElementById('cardWrapper').innerHTML = filtered.map(d => `
            <div class="card">
                <strong>${d.Name}</strong><p>${d.Branch}</p><p>${formatDate(d.Date_of_birth)}</p>
                <button class="btn" onclick="openDetails('${d.Name}')">View Details</button>
            </div>
        `).join('');
    }

    function formatDate(dStr) {
        if (!dStr) return "";
        const d = new Date(dStr);
        return `${d.getDate().toString().padStart(2, '0')}-${months[d.getMonth()]}`;
    }

    function showGallery() {
        let html = `<h3>Gallery</h3><div style="display:grid; grid-template-columns:repeat(5, 1fr); gap:10px;">`;
        for(let i=1; i<=100; i++) {
            html += `<img src="group_pics/group-${i}.jpeg" style="width:100%" onerror="this.style.display='none'">`;
        }
        document.getElementById('modalBody').innerHTML = html + `</div><br><button class="btn" onclick="closeModal()">Close</button>`;
        document.getElementById('modal').style.display = 'flex';
    }

    function toggleView() {
        isTable = !isTable;
        document.getElementById('tableWrapper').classList.toggle('hidden');
        document.getElementById('cardWrapper').classList.toggle('hidden');
        document.getElementById('viewBtn').innerText = isTable ? "Show Card View" : "Show Table View";
        render();
    }

    function openDetails(name) { /* Standard Modal logic here */ }
    function closeModal() { document.getElementById('modal').style.display = 'none'; }
    window.onload = init;
</script>
</body>
</html>
